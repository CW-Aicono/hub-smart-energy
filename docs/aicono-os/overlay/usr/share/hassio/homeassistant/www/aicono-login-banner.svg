<?xml version="1.0" encoding="UTF-8"?>
<!-- AICONO Login-Banner – Phase 3. Wird im Login-Screen oben angezeigt. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1F44"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
  </defs>
  <rect width="480" height="160" rx="16" fill="url(#bg)"/>
  <circle cx="80" cy="80" r="36" fill="none" stroke="#14B8A6" stroke-width="4"/>
  <path d="M64 80 L80 60 L96 80 L80 100 Z" fill="#14B8A6"/>
  <text x="140" y="86" font-family="Montserrat, Inter, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#FFFFFF" letter-spacing="3">
    AICONO
  </text>
  <text x="140" y="112" font-family="Inter, Arial, sans-serif"
        font-size="13" font-weight="500" fill="#14B8A6" letter-spacing="4">
