# Home Assistant Add-on: EMS Gateway Hub
# ========================================
# Lokaler Gateway-Hub für Energiemanagementsysteme.
# Sammelt Daten von HA-Entitäten und pusht sie an die Cloud.

name: "EMS Gateway Hub"
description: "Lokaler Gateway-Hub für das Energiemanagementsystem. Sammelt Sensordaten von Home Assistant und synchronisiert sie mit der Cloud."
version: "1.0.0"
slug: "ems-gateway-hub"
url: "https://hub-smart-energy.lovable.app"
arch:
  - aarch64
  - amd64
  - armv7
startup: "application"
boot: "auto"
ingress: false
panel_icon: "mdi:flash"
hassio_api: true
homeassistant_api: true

# Lokaler Health-Endpoint
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": "Health & Status API"

# Konfigurationsoptionen
options:
  supabase_url: null
  gateway_api_key: null
  tenant_id: null
  device_name: "ha-addon"
  poll_interval_seconds: 30
  flush_interval_seconds: 5
  heartbeat_interval_seconds: 60
  entity_filter: "sensor.*_energy,sensor.*_power,sensor.*_consumption"
  offline_buffer_max_mb: 100
  auto_backup_hours: 24

schema:
  supabase_url: url
  gateway_api_key: "str(1,)"
  tenant_id: "str(1,)"
  device_name: "str(1,)"
  poll_interval_seconds: "int(1,)"
  flush_interval_seconds: "int(1,)"
  heartbeat_interval_seconds: "int(1,)"
  entity_filter: "str?"
  offline_buffer_max_mb: "int(1,)"
  auto_backup_hours: "int(0,)"
