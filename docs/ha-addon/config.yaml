# AICONO EMS Gateway
# ========================================
# Lokaler Gateway-Hub für Energiemanagementsysteme.
# Sammelt Sensordaten, führt Automationen lokal aus und synchronisiert mit der Cloud.

name: "AICONO EMS Gateway"
description: "Lokaler Gateway-Hub für das AICONO Energiemanagementsystem. Identifiziert sich per MAC-Adresse + Benutzername/Passwort (Loxone-Modell). Cloud-URL und Schlüssel sind fest hinterlegt – Sie müssen nur Ihre Zugangsdaten eintragen und in AICONO die MAC der Liegenschaft zuordnen."
version: "2.3.0"
slug: "aicono-ems-gateway"
url: "https://hub-smart-energy.lovable.app"
arch:
  - aarch64
  - amd64
  - armv7
startup: "application"
boot: "auto"
ingress: true
ingress_port: 8099
panel_icon: "mdi:lightning-bolt-circle"
panel_title: "AICONO EMS"
hassio_api: true
homeassistant_api: true

# Lokaler Health + UI Endpoint
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": "Health, Status API & Web-UI"

# Konfigurationsoptionen
options:
  gateway_username: ""
  gateway_password: ""
  device_name: "aicono-ems"
  cloud_url: null
  gateway_api_key: null
  tenant_id: null
  poll_interval_seconds: 30
  flush_interval_seconds: 5
  heartbeat_interval_seconds: 60
  automation_eval_seconds: 30
  entity_filter: "sensor.*_energy,sensor.*_power,sensor.*_consumption"
  offline_buffer_max_mb: 100
  auto_backup_hours: 24
  cloudflare_enabled: false
  cloudflare_tunnel_token: ""

schema:
  gateway_username: "str?"
  gateway_password: "password?"
  device_name: str
  cloud_url: "url?"
  gateway_api_key: "str?"
  tenant_id: "str?"
  poll_interval_seconds: int
  flush_interval_seconds: int
  heartbeat_interval_seconds: int
  automation_eval_seconds: int
  entity_filter: "str?"
  offline_buffer_max_mb: int
  auto_backup_hours: int
  cloudflare_enabled: bool
  cloudflare_tunnel_token: "str?"

