# AICONO EMS Gateway v3.0
# ========================================
# Lokaler Gateway-Hub für das AICONO Energiemanagementsystem.
#
# v3.0 BREAKING CHANGES:
#  - Cloudflare-Tunnel entfernt (komplett ersetzt durch WebSocket-Push)
#  - Identifikation jetzt zwingend über MAC-Adresse + Benutzername + Passwort
#  - Bidirektionale Kommunikation via Supabase Realtime (gateway-ws)
#  - Schaltbefehle aus der Cloud kommen in Echtzeit ohne Polling an
#
# Nach dem Update muss in den Add-on-Optionen lediglich Benutzername + Passwort
# eingetragen werden – die MAC wird automatisch ausgelesen und an die Cloud
# gemeldet. Die Liegenschafts-Zuordnung erfolgt im AICONO Backend per MAC.

name: "AICONO EMS Gateway"
description: "Lokaler Gateway-Hub für das AICONO EMS. Identifiziert sich per MAC-Adresse + Benutzername/Passwort. Kommuniziert bidirektional via WebSocket mit der AICONO Cloud – ohne Cloudflare, ohne offene Ports."
version: "3.1.2"
slug: "aicono-ems-gateway"
url: "https://hub-smart-energy.lovable.app"
arch:
  - aarch64
  - amd64
startup: "application"
boot: "auto"
ingress: true
ingress_port: 8099
watchdog: "http://[HOST]:[PORT:8099]/api/status"
panel_icon: "mdi:lightning-bolt-circle"
panel_title: "AICONO EMS"
hassio_api: true
homeassistant_api: true
host_network: false

# Lokaler Health + UI Endpoint
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": "Health, Status API & Web-UI"

# Konfigurationsoptionen
options:
  gateway_username: ""
  gateway_password: ""
  device_name: "aicono-ems"
  cloud_url: null
  tenant_id: null
  poll_interval_seconds: 30
  flush_interval_seconds: 5
  heartbeat_interval_seconds: 60
  automation_eval_seconds: 30
  entity_filter: "sensor.*_energy,sensor.*_power,sensor.*_consumption"
  offline_buffer_max_mb: 100
  auto_backup_hours: 24

schema:
  gateway_username: "str?"
  gateway_password: "password?"
  device_name: str
  cloud_url: "url?"
  tenant_id: "str?"
  poll_interval_seconds: int
  flush_interval_seconds: int
  heartbeat_interval_seconds: int
  automation_eval_seconds: int
  entity_filter: "str?"
  offline_buffer_max_mb: int
  auto_backup_hours: int
