name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Gib "LIVE" ein, um Prod-Deploy zu bestaetigen'
        required: true
        default: ''

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Bestaetigung pruefen
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "LIVE" ]; then
            echo "::error::Bestaetigung fehlt. Tippe 'LIVE' in das Eingabefeld."
            exit 1
          fi

      - name: Checkout Repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git-User konfigurieren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lockfile auf staging auto-heilen (falls drift)
        run: |
          git fetch origin staging
          git checkout -B staging origin/staging
          if npm ci --dry-run --no-audit --no-fund > /dev/null 2>&1; then
            echo "Lockfile ist in sync."
          else
            echo "::notice::Lockfile-Drift erkannt - regeneriere package-lock.json"
            npm install --package-lock-only --no-audit --no-fund
            if git diff --quiet package-lock.json; then
              echo "::warning::npm ci scheitert, aber package-lock.json hat sich nicht geaendert - vermutlich anderer Grund."
            else
              git add package-lock.json
              git commit -m "chore(deps): auto-regenerate package-lock.json [skip ci]"
              git push origin staging
            fi
          fi

      - name: App-Code aus staging in main syncen (CI auf main geschützt)
        run: |
          set -euo pipefail
          git fetch origin staging main

          CI_BASELINE="$(git rev-parse origin/main)"
          STAGING_SHA="$(git rev-parse origin/staging)"

          # Statt klassischem `git merge` (der an modify/delete-Konflikten scheitert,
          # wenn Lovable CI-Dateien auf staging per Revert gelöscht hat) bauen wir
          # den Ziel-Tree direkt: staging-Tree als Basis, CI-Pfade aus main drüberlegen.
          git checkout --detach "$STAGING_SHA"

          CI_PATHS=(
            .github/workflows
            Dockerfile
            nginx.conf
            scripts
            supabase-docker
            build
            tsconfig.node.json
            docs/GO-LIVE.md
            docs/CI-SETUP.md
            docs/DEPLOYMENT.md
          )
          for path in "${CI_PATHS[@]}"; do
            if git cat-file -e "${CI_BASELINE}:${path}" 2>/dev/null; then
              git checkout "${CI_BASELINE}" -- "${path}"
            fi
          done

          git add -A
          TARGET_TREE="$(git write-tree)"
          MAIN_TREE="$(git rev-parse "${CI_BASELINE}^{tree}")"

          if [ "$TARGET_TREE" = "$MAIN_TREE" ]; then
            echo "Nichts zu syncen (Ziel-Tree = main-Tree)."
            git checkout main
          else
            MERGE_COMMIT="$(git commit-tree "$TARGET_TREE" \
              -p "$CI_BASELINE" \
              -p "$STAGING_SHA" \
              -m "sync app from staging (CI on main preserved)" \
              -m "Auto-Merge vom Deploy-Workflow.")"
            echo "Neuer Merge-Commit: $MERGE_COMMIT"
            git checkout -B main "$MERGE_COMMIT"
            git push origin main
          fi

      - name: Kurz-SHA ermitteln
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Image-Name (lowercase, von GHCR verlangt)
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Frontend-Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ steps.sha.outputs.short }}
            ${{ steps.img.outputs.name }}:latest
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_CSP_CONTENT=${{ secrets.VITE_CSP_CONTENT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy auf Hetzner per SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /opt/hub-smart-energy
            ./scripts/deploy.sh ${{ steps.sha.outputs.short }}

      - name: Ergebnis
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deploy erfolgreich. Live: https://ems.aicono.org"
          else
            echo "Deploy fehlgeschlagen. Prod laeuft unveraendert weiter."
          fi
