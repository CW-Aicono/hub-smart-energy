name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Gib "LIVE" ein, um Prod-Deploy zu bestaetigen'
        required: true
        default: ''

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Bestaetigung pruefen
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "LIVE" ]; then
            echo "::error::Bestaetigung fehlt. Tippe 'LIVE' in das Eingabefeld."
            exit 1
          fi

      - name: Checkout Repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git-User konfigurieren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fast-Forward Merge staging -> main
        run: |
          git fetch origin staging main
          git checkout main
          if ! git merge --ff-only origin/staging; then
            echo "::error::Fast-forward nicht moeglich. main und staging sind divergiert."
            echo "::error::Bitte David kontaktieren - manuelles Rebase noetig."
            exit 1
          fi
          git push origin main

      - name: Kurz-SHA ermitteln
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Bei GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Frontend-Image bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_CSP_CONTENT=${{ secrets.VITE_CSP_CONTENT }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy auf Hetzner per SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /opt/hub-smart-energy
            ./scripts/deploy.sh ${{ steps.sha.outputs.short }}

      - name: Ergebnis
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deploy erfolgreich. Live: https://ems.aicono.org"
          else
            echo "Deploy fehlgeschlagen. Prod laeuft unveraendert weiter."
          fi
