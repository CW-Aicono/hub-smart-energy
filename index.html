    <style>
      #boot-fallback {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a; color: #e2e8f0; text-align: center; padding: 24px;
      }
      #boot-fallback .spinner {
        width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #38bdf8; border-radius: 50%;
        animation: boot-spin 0.9s linear infinite; margin-bottom: 16px;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="boot-fallback">
        <div class="spinner"></div>
        <div style="font-size: 16px; font-weight: 500;">Anwendung wird geladen …</div>
        <div style="font-size: 13px; opacity: 0.7; margin-top: 8px; max-width: 360px;">
          Falls dies länger als ein paar Sekunden dauert, bitte die Seite neu laden (Strg/Cmd + R).
        </div>
      </div>
    </div>
    <noscript>
      <div style="padding:24px;font-family:sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;">
        <h1>JavaScript erforderlich</h1>

      </div>

    <script type="module" src="/src/main.tsx"></script>
